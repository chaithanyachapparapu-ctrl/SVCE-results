<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SVCE Tirupati Exam Results Portal - Check your semester results by hall ticket number.">
    <title>SVCE Tirupati — Exam Results</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- Main Content -->
    <div class="main-container">

        <!-- Logo -->
        <div class="logo-section">
            <img src="assets/campx-logo.jpg" alt="CampX">
        </div>

        <!-- Search Form -->
        <div class="form-card">
            <div class="form-card-header">
                <h3>Exam Results</h3>
            </div>

            <div class="form-card-body">
                <!-- Hallticket number -->
                <div class="form-group">
                    <label for="hallTicketInput">Hallticket number <span class="required">*</span></label>
                    <input 
                        type="text" 
                        id="hallTicketInput" 
                        class="uppercase"
                        autocomplete="off" 
                        spellcheck="false"
                        maxlength="15"
                    >
                </div>

                <!-- Select Exam Type -->
                <div class="form-group">
                    <label for="examType">Select Exam Type <span class="required">*</span></label>
                    <select id="examType">
                        <option value="" disabled selected>-- Select Exam Type --</option>
                        <option value="Regular">Regular</option>
                        <option value="Supplementary">Supplementary</option>
                    </select>
                </div>

                <!-- View Type -->
                <div class="form-group">
                    <label for="viewType">View Type</label>
                    <select id="viewType">
                        <option value="Single Semester" selected>Single Semester</option>
                    </select>
                </div>

                <!-- Semester -->
                <div class="form-group">
                    <label for="semesterSelect">Semester <span class="required">*</span></label>
                    <select id="semesterSelect">
                        <option value="" disabled selected>-- Select Semester --</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                    </select>
                </div>

                <!-- Submit -->
                <button class="btn-submit" id="searchBtn">
                    Get Result
                </button>
            </div>
        </div>

        <!-- Loader -->
        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p>Fetching result...</p>
        </div>

        <!-- Result Display Area -->
        <div class="result-container" id="resultContainer"></div>

    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 <a href="#">Sri Venkateswara College of Engineering</a>, Tirupati.</p>
        <p>For academic use only.</p>
    </footer>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script src="js/app.js"></script>
    <script src="js/pdf.js"></script>
</body>
</html>
