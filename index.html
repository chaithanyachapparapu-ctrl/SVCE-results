<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="SVCE Tirupati Exam Results Portal - Check your semester results by hall ticket number.">
    <title>SVCE Tirupati — Exam Results</title>
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com; connect-src 'self' https://firestore.googleapis.com https://api.ipify.org; img-src 'self' data: https://media4.giphy.com;">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdhtnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha384-t1nt8BQoYMLFN5p42tRAtuAAFQaCQODekUVeKKZrEnEyp4H2R0RHFz0KWpmj7i8g" crossorigin="anonymous">
</head>

<body>

    <!-- Main Content -->
    <div class="main-container">

        <!-- Logo -->
        <div class="logo-section">
            <img src="assets/logo.png.png" alt="SVCE Logo">
        </div>

        <!-- Search Form -->
        <div class="form-card">
            <div class="form-card-header">
                <h3>Exam Results</h3>
            </div>

            <div class="form-card-body">
                <!-- Hallticket number -->
                <div class="form-group">
                    <label for="hallTicketInput">Hallticket number <span class="required">*</span></label>
                    <input type="text" id="hallTicketInput" class="uppercase" autocomplete="off" spellcheck="false"
                        maxlength="15">
                </div>

                <!-- Select Exam Type -->
                <div class="form-group">
                    <label for="examType">Select Exam Type <span class="required">*</span></label>
                    <select id="examType">
                        <option value="" disabled selected>-- Select Exam Type --</option>
                        <option value="Regular">Regular</option>
                        <option value="Supplementary">Supplementary</option>
                    </select>
                </div>

                <!-- View Type -->
                <div class="form-group">
                    <label for="viewType">View Type</label>
                    <select id="viewType">
                        <option value="Single Semester" selected>Single Semester</option>
                    </select>
                </div>

                <!-- Semester -->
                <div class="form-group">
                    <label for="semesterSelect">Semester <span class="required">*</span></label>
                    <select id="semesterSelect">
                        <option value="" disabled selected>-- Select Semester --</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                    </select>
                </div>

                <!-- Submit -->
                <button class="btn-submit" id="searchBtn">
                    Get Result
                </button>
            </div>
        </div>

        <!-- Loader -->
        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p>Fetching result...</p>
        </div>

        <!-- Result Display Area -->
        <div class="result-container" id="resultContainer"></div>

    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 <a href="#">Sri Venkateswara College of Engineering</a>, Tirupati.</p>
        <p>For academic use only.</p>
    </footer>


    <!-- PDF Generation libs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" integrity="sha384-JcnsjUPPylna1s1fvi1u12X5qjY5OL56iySh75FdtrwhO/SWXgMjoVqcKyIIWOLk" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js" integrity="sha384-fCAW/rDWORTbQXSiB7mOg0QtQ5c+r0f544y6XoKjuVva0nMBlCpNUjiFeG5iMdS3" crossorigin="anonymous"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js" integrity="sha384-sEVIly94UBRLKWdkYoPpSG7GD/e79YHMrxVyZaOk712Ga7+EAw6w1EFi+xBzBdd+" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js" integrity="sha384-M481iNZJtbpypKgvlvZ+78Giq0BsewFLk5r2k+MOcGXlwKCc27DQRZ+WCV/zpmpC" crossorigin="anonymous"></script>

    <!-- App Scripts -->
    <script src="js/app.js?v=2.1"></script>
    <script src="js/pdf.js"></script>
    <script src="js/error-overlay.js"></script>
</body>

</html>
